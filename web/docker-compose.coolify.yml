services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.auto.linkpc.net/api/v1}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://auto.linkpc.net}
    healthcheck:
      test:
        - CMD
        - wget
        - -qO-
        - http://127.0.0.1:3000/
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 60s
    labels:
      - traefik.enable=true
      - traefik.http.middlewares.cm-web-redirect.redirectscheme.scheme=https
      - traefik.http.routers.cm-web-http.rule=Host(`auto.linkpc.net`)
      - traefik.http.routers.cm-web-http.service=cm-web
      - traefik.http.routers.cm-web-http.entrypoints=http
      - traefik.http.routers.cm-web-http.middlewares=cm-web-redirect
      - traefik.http.routers.cm-web.rule=Host(`auto.linkpc.net`)
      - traefik.http.routers.cm-web.service=cm-web
      - traefik.http.routers.cm-web.entrypoints=https
      - traefik.http.routers.cm-web.tls=true
      - traefik.http.routers.cm-web.tls.certresolver=letsencrypt
      - traefik.http.services.cm-web.loadbalancer.server.port=3000
    restart: unless-stopped

networks:
  default:
    name: coolify
    external: true
