services:
  api:
    build: .
    healthcheck:
      test:
        - CMD
        - python
        - "-c"
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health', timeout=5).read()"
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 120s
    labels:
      - traefik.enable=true
      - traefik.http.middlewares.cm-api-redirect.redirectscheme.scheme=https
      - traefik.http.routers.cm-api-http.rule=Host(`api.auto.linkpc.net`)
      - traefik.http.routers.cm-api-http.service=cm-api
      - traefik.http.routers.cm-api-http.entrypoints=http
      - traefik.http.routers.cm-api-http.middlewares=cm-api-redirect
      - traefik.http.routers.cm-api.rule=Host(`api.auto.linkpc.net`)
      - traefik.http.routers.cm-api.service=cm-api
      - traefik.http.routers.cm-api.entrypoints=https
      - traefik.http.routers.cm-api.tls=true
      - traefik.http.routers.cm-api.tls.certresolver=letsencrypt
      - traefik.http.services.cm-api.loadbalancer.server.port=8000
    environment:
      - APP_ENV=production
      - DATABASE_URL=postgresql+asyncpg://carmarket:${POSTGRES_PASSWORD}@db:5432/carmarket
      - REDIS_URL=redis://redis:6379/0
      - CORS_ORIGINS=${CORS_ORIGINS:-https://auto.linkpc.net}
      - SECRET_KEY=${SECRET_KEY}
      - SMS_PROVIDER=mock
      - S3_ENDPOINT=http://minio:9000
      - S3_ACCESS_KEY=${MINIO_ROOT_USER:-carmarketminio}
      - S3_SECRET_KEY=${MINIO_ROOT_PASSWORD}
      - S3_BUCKET=carmarket-images
      - S3_PUBLIC_URL=https://files.auto.linkpc.net/carmarket-images
      - S3_REGION=us-east-1
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: carmarket
      POSTGRES_USER: carmarket
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U carmarket"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - cm_postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - cm_redis_data:/data
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-carmarketminio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - cm_minio_data:/data
    labels:
      - traefik.enable=true
      - traefik.http.middlewares.cm-files-redirect.redirectscheme.scheme=https
      - traefik.http.routers.cm-files-http.rule=Host(`files.auto.linkpc.net`)
      - traefik.http.routers.cm-files-http.service=cm-files
      - traefik.http.routers.cm-files-http.entrypoints=http
      - traefik.http.routers.cm-files-http.middlewares=cm-files-redirect
      - traefik.http.routers.cm-files.rule=Host(`files.auto.linkpc.net`)
      - traefik.http.routers.cm-files.service=cm-files
      - traefik.http.routers.cm-files.entrypoints=https
      - traefik.http.routers.cm-files.tls=true
      - traefik.http.routers.cm-files.tls.certresolver=letsencrypt
      - traefik.http.services.cm-files.loadbalancer.server.port=9000
    restart: unless-stopped

volumes:
  cm_postgres_data:
  cm_redis_data:
  cm_minio_data:

networks:
  default:
    name: coolify
    external: true
